<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reserve • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Reserve</h1>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./reserve.html">Reserve</a>
      <a href="./admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="row">
        <div>
          <label>Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>Court</label>
          <select id="court"></select>
        </div>
      </div>
      <p class="small">Slots are 1 hour. Open Play/Club Night is blocked.</p>
    </section>

    <section class="card">
      <h2>Login</h2>
      <div class="row">
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button id="btnLogin">Login</button>
        <button id="btnSignup">Sign up</button>
      </div>
      <p id="authMsg" class="small"></p>
    </section>

    <section class="card">
      <h2>Available slots</h2>
      <div id="slots" class="slotgrid"></div>
      <div class="row" style="margin-top:10px;">
        <div class="card" style="border:none;padding:0;">
          <div>Total: <b>₱300</b> (pay on-site)</div>
          <div class="small" id="selected"></div>
        </div>
        <button id="btnBook">Confirm booking</button>
      </div>
      <p id="msg" class="small"></p>
    </section>
  </main>

  <script type="module" src="./reserve.js"></script>
</body>
</html>
