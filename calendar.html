<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendar • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* extra styles for the grid */
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    .toolbar > div { flex: 1 1 220px; }
    .legend { display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:#555; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid #ddd; background:#fff; }
    .gridwrap { overflow:auto; border:1px solid #e6e6e6; border-radius:14px; }
    table { width:100%; border-collapse:separate; border-spacing:0; min-width:720px; }
    th, td { border-bottom:1px solid #eee; border-right:1px solid #eee; padding:10px; vertical-align:top; }
    th { position:sticky; top:0; background:#fff; z-index:2; text-align:left; font-size:13px; }
    th:first-child { left:0; z-index:3; }
    td:first-child { position:sticky; left:0; background:#fff; z-index:1; width:110px; font-weight:600; }
    tr:last-child td { border-bottom:none; }
    td:last-child, th:last-child { border-right:none; }

    .cell { border-radius:12px; padding:10px; border:1px solid #ddd; background:#fff; }
    .status { font-size:12px; color:#555; margin-top:4px; }

    /* Status looks */
    .available { border-color:#111; }
    .booked { opacity:.6; }
    .blocked { opacity:.6; }
    .event { opacity:.6; }

    /* Mobile: keep it clean */
    @media (max-width: 720px) {
      .gridwrap { border-radius:12px; }
      th, td { padding:8px; }
      td:first-child { width:96px; }
      table { min-width:640px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Calendar</h1>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./reserve.html">Reserve</a>
      <a href="./calendar.html">Calendar</a>
      <a href="./admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="toolbar">
        <div>
          <label>Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>View</label>
          <select id="view">
            <option value="all">All courts (grid)</option>
            <option value="c1">Court 1 only</option>
            <option value="c2">Court 2 only</option>
            <option value="c3">Court 3 only</option>
          </select>
        </div>
      </div>

      <div class="legend" style="margin-top:10px;">
        <span class="pill"><b>Available</b> (can book)</span>
        <span class="pill">Booked</span>
        <span class="pill">Open Play / Club Night</span>
        <span class="pill">Blocked (Admin)</span>
      </div>

      <p class="small" style="margin-top:10px;">
        Hours: 6:00 AM–12:00 AM • Slots: 1 hour • Events/Blocks are unavailable
      </p>
    </section>

    <section class="card">
      <div id="msg" class="small"></div>
      <div class="gridwrap">
        <table id="grid">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="./calendar.js"></script>
</body>
</html>
