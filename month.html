<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Month • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .monthbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .monthbar button{width:auto;padding:10px 12px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#111}
    .monthgrid{display:grid;gap:8px;grid-template-columns:repeat(7,1fr)}
    .dow{font-size:12px;color:#666;padding:6px 2px;text-align:center}
    .day{
      border:1px solid #e6e6e6;border-radius:14px;padding:10px;
      min-height:82px;background:#fff;cursor:pointer;
      display:flex;flex-direction:column;gap:6px;
    }
    .day.muted{opacity:.45;cursor:default}
    .daynum{font-weight:700}
    .badges{display:flex;gap:6px;flex-wrap:wrap}
    .badge{font-size:11px;border:1px solid #ddd;border-radius:999px;padding:4px 8px;color:#333}
  </style>
</head>
  <script type="module">
  import { initHeaderAuth } from "./app-init.js";
  initHeaderAuth();
</script>
  <script src="./navbar.js"></script>
<body>
 <header class="gb-topbar">
  <a class="gb-brand" href="./index.html">
    <span class="gb-logo">GB</span>
    <span class="gb-brand-text">Gym Buddies Pickle House</span>
  </a>

  <button class="gb-burger" id="gbBurger" aria-label="Open menu" aria-expanded="false">
    ☰
  </button>

  <nav class="gb-nav" id="gbNav">
    <a href="./index.html" class="gb-link">Home</a>
    <a href="./reserve.html" class="gb-link">Reserve</a>
    <a href="./calendar.html" class="gb-link">Calendar</a>
    <a href="./monthly.html" class="gb-link">Monthly</a>
    <a href="./my.html" class="gb-link">My Bookings</a>
    <a href="./admin.html" class="gb-link">Admin</a>
  </nav>

  <!-- Profile ALWAYS right -->
  <div class="gb-profile-area" id="profileArea"></div>
</header>

  <main class="container">
    <section class="card">
      <div class="monthbar">
        <button id="prev">◀</button>
        <div style="flex:1">
          <div style="font-weight:700" id="title">Month</div>
          <div class="small">Tap a day to open the daily schedule (click-to-book).</div>
        </div>
        <button id="today">Today</button>
        <button id="next">▶</button>
      </div>
      <div style="margin-top:12px" class="monthgrid" id="dow"></div>
      <div style="margin-top:8px" class="monthgrid" id="grid"></div>
      <div id="msg" class="small" style="margin-top:10px;"></div>
    </section>
  </main>

  <script type="module" src="./month.js"></script>
</body>
</html>
