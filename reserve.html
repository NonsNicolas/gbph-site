<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reserve • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
  <script type="module">
  import { initHeaderAuth } from "./app-init.js";
  initHeaderAuth();
</script>
<body>
  <header class="gb-topbar">
  <a class="gb-brand" href="./index.html">
    <span class="gb-logo">GB</span>
    <span class="gb-brand-text">Gym Buddies Pickle House</span>
  </a>

  <button class="gb-burger" id="gbBurger" aria-label="Open menu" aria-expanded="false">
    ☰
  </button>

  <nav class="gb-nav" id="gbNav">
    <a href="./index.html" class="gb-link">Home</a>
    <a href="./reserve.html" class="gb-link">Reserve</a>
    <a href="./calendar.html" class="gb-link">Calendar</a>
    <a href="./monthly.html" class="gb-link">Monthly</a>
    <a href="./my.html" class="gb-link">My Bookings</a>
    <a href="./admin.html" class="gb-link">Admin</a>
  </nav>

  <!-- Profile ALWAYS right -->
  <div class="gb-profile-area" id="profileArea"></div>
</header>

  <main class="container">
    <section class="card">
      <div class="row">
        <div>
          <label>Date</label>
          <input id="date" type="date" value="" />
        </div>
        <div>
          <label>Court</label>
          <select id="court"></select>
        </div>
      </div>
      <p class="small">Slots are 1 hour. Open Play/Club Night is blocked.</p>
    </section>

    <section class="card">
  <h2>Available slots</h2>
  <div id="slots" class="slotgrid"></div>

  <div class="row" style="margin-top:10px;">
    <div class="card" style="border:none;padding:0;">
      <div>Total: <b>₱300</b> (pay on-site)</div>
      <div class="small" id="selected"></div>
    </div>
    <button id="btnBook">Confirm booking</button>
  </div>

  <p id="msg" class="small"></p>
</section>
  </main>

  <script type="module" src="./reserve.js"></script>
</body>
</html>
