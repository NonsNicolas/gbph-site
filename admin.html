<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
  <script type="module">
  import { initHeaderAuth } from "./app-init.js";
  initHeaderAuth();
</script>
<body>
  <header class="header">
    <h1>Admin</h1>
    <nav class="nav" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
  <a href="./index.html">Home</a>
  <a href="./reserve.html">Reserve</a>
  <a href="./calendar.html">Calendar</a>
  <a href="./month.html">Monthly</a>
  <a href="./my.html">My Bookings</a>
  <a href="./admin-manager.html">Admin</a>
  <span style="flex:1"></span>
  <div id="profileArea"></div>
</nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Admin login</h2>
      <div class="row">
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button id="btnLogin">Login</button>
      </div>
      <p id="authMsg" class="small"></p>
      <p class="small">To make yourself admin: Supabase → Table Editor → profiles → set role = <b>admin</b>.</p>
    </section>

    <section class="card">
      <h2>Block time (admin-only)</h2>
      <div class="row">
        <div>
          <label>Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>Court</label>
          <select id="court">
            <option value="all">All courts</option>
          </select>
        </div>
      </div>
      <div class="row">
        <input id="start" type="time" value="06:00" />
        <input id="end" type="time" value="07:00" />
      </div>
      <input id="reason" placeholder="Reason (e.g. Maintenance)" value="Maintenance" />
      <button id="btnBlock">Block time</button>
      <p id="blockMsg" class="small"></p>
    </section>
  </main>

  <script type="module" src="./admin.js"></script>
</body>
</html>
