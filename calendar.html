<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendar • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- Professional navbar (from your template) -->
  <header class="gb-topbar">
    <a class="gb-brand" href="./index.html">
      <span class="gb-logo">GB</span>
      <span class="gb-brand-text">Gym Buddies Pickle House</span>
    </a>

    <button class="gb-burger" id="gbBurger" aria-label="Open menu" aria-expanded="false">☰</button>

    <nav class="gb-nav" id="gbNav">
      <a href="./index.html" class="gb-link">Home</a>
      <a href="./reserve.html" class="gb-link">Reserve</a>
      <a href="./calendar.html" class="gb-link">Calendar</a>
      <a href="./monthly.html" class="gb-link">Monthly</a>
      <a href="./my.html" class="gb-link">My Bookings</a>
      <a href="./admin.html" class="gb-link">Admin</a>
    </nav>

    <div class="gb-profile-area" id="profileArea"></div>
  </header>

  <main class="container">
    <section class="card" style="padding:14px;">
      <div class="cal-toolbar">
        <div class="cal-left">
          <button class="cal-btn" id="btnToday" type="button">Today</button>
          <button class="cal-icon" id="btnPrev" type="button" aria-label="Previous month">‹</button>
          <button class="cal-icon" id="btnNext" type="button" aria-label="Next month">›</button>
          <div class="cal-title" id="monthTitle">Month YYYY</div>
        </div>

        <div class="cal-right">
          <label class="cal-label" for="courtFilter">Court</label>
          <select id="courtFilter" class="cal-select">
            <option value="all">All</option>
          </select>
        </div>
      </div>

      <div class="cal-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>

      <div class="cal-grid" id="calGrid"></div>

      <div class="small" id="calMsg" style="margin-top:10px;"></div>
    </section>
  </main>

  <script src="./navbar.js"></script>
  <script type="module" src="./calendar.js"></script>
</body>
</html>
