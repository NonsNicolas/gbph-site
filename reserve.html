<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reserve • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Reserve</h1>
<nav class="nav" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
  ...
  <span style="flex:1"></span>
  <div id="profileArea"></div>
</nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="row">
        <div>
          <label>Date</label>
          <input id="date" type="date" value="" />
        </div>
        <div>
          <label>Court</label>
          <select id="court"></select>
        </div>
      </div>
      <p class="small">Slots are 1 hour. Open Play/Club Night is blocked.</p>
    </section>

    <section class="card">
      <h2>Available slots</h2>
      <div id="slots" class="slotgrid"></div>
      <div class="row" style="margin-top:10px;">
        <div class="card" style="border:none;padding:0;">
          <div>Total: <b>₱300</b> (pay on-site)</div>
          <div class="small" id="selected"></div>
        </div>
        <button id="btnBook">Confirm booking</button>
      </div>
      <p id="msg" class="small"></p>
    </section>
  </main>

  <script type="module" src="./reserve.js"></script>
</body>
</html>
