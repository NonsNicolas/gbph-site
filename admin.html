<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • GBPH</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
  <script type="module">
  import { initHeaderAuth } from "./app-init.js";
  initHeaderAuth();
</script>
  <script src="./navbar.js"></script>
<body>
  <header class="gb-topbar">
  <a class="gb-brand" href="./index.html">
    <span class="gb-logo">GB</span>
    <span class="gb-brand-text">Gym Buddies Pickle House</span>
  </a>

  <button class="gb-burger" id="gbBurger" aria-label="Open menu" aria-expanded="false">
    ☰
  </button>

  <nav class="gb-nav" id="gbNav">
    <a href="./index.html" class="gb-link">Home</a>
    <a href="./reserve.html" class="gb-link">Reserve</a>
    <a href="./calendar.html" class="gb-link">Calendar</a>
    <a href="./monthly.html" class="gb-link">Monthly</a>
    <a href="./my.html" class="gb-link">My Bookings</a>
    <a href="./admin.html" class="gb-link">Admin</a>
  </nav>

  <!-- Profile ALWAYS right -->
  <div class="gb-profile-area" id="profileArea"></div>
</header>

  <main class="container">
    <section class="card">
      <h2>Admin login</h2>
      <div class="row">
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button id="btnLogin">Login</button>
      </div>
      <p id="authMsg" class="small"></p>
      <p class="small">To make yourself admin: Supabase → Table Editor → profiles → set role = <b>admin</b>.</p>
    </section>

    <section class="card">
      <h2>Block time (admin-only)</h2>
      <div class="row">
        <div>
          <label>Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>Court</label>
          <select id="court">
            <option value="all">All courts</option>
          </select>
        </div>
      </div>
      <div class="row">
        <input id="start" type="time" value="06:00" />
        <input id="end" type="time" value="07:00" />
      </div>
      <input id="reason" placeholder="Reason (e.g. Maintenance)" value="Maintenance" />
      <button id="btnBlock">Block time</button>
      <p id="blockMsg" class="small"></p>
    </section>
  </main>

  <script type="module" src="./admin.js"></script>
</body>
</html>
